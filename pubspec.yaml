name: mebellar_app
description: "Mebellar olami mobile app"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_bloc: ^9.0.0
  get_it: ^8.0.0
  equatable: ^2.0.7

  # Routing
  go_router: ^14.6.0

  # Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Backend
  supabase_flutter: ^2.8.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0

  # App lifecycle
  flutter_phoenix: ^1.1.1

  # Localization — translations live in pure Dart (lib/core/i18n/) so
  # Shorebird code-push can ship copy edits OTA. intl stays for
  # NumberFormat / DateFormat helpers.
  intl: ^0.20.2

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  image: ^4.3.0
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0

  # Typography
  google_fonts: ^6.2.1

  # Icons
  iconsax_flutter: ^1.0.0

  # Charts
  fl_chart: ^0.69.0

  # External actions (tel:, telegram links)
  url_launcher: ^6.3.1

  # Maps & location
  yandex_mapkit: ^4.2.1
  geolocator: ^13.0.2
  mask_text_input_formatter: ^2.9.0

  # Logging
  talker_flutter: ^5.1.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true
