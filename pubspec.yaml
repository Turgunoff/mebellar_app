name: woody_app
description: "Woody — Mebel do'koni"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_bloc: ^9.0.0
  # Event transformers (restartable / droppable) for the B.7 performance pass.
  bloc_concurrency: ^0.3.0
  get_it: ^8.0.0
  equatable: ^2.0.7

  # Testable time — `clock.now()` in place of `DateTime.now()` so tests can
  # pin "now" with `withClock(...)` instead of waiting on the wall clock
  # (ROADMAP B.5 test-coverage baseline).
  clock: ^1.1.1

  # Routing
  go_router: ^14.6.0

  # Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Backend
  supabase_flutter: ^2.8.0

  # Push notifications — FCM topic-based broadcasts + per-token personal
  # pushes. The device subscribes to the `news` topic on launch and saves
  # its FCM token to `device_tokens` after sign-in so the backend can fan
  # out personal pings.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # Required to display a notification banner when an FCM push arrives
  # while the app is in the foreground — Android only auto-shows pushes
  # in the system tray when the app is backgrounded or killed.
  flutter_local_notifications: ^18.0.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0

  # App lifecycle
  flutter_phoenix: ^1.1.1

  # Localization — translations live in pure Dart (lib/core/i18n/) so
  # Shorebird code-push can ship copy edits OTA. intl stays for
  # NumberFormat / DateFormat helpers.
  intl: ^0.20.2

  # Images
  cached_network_image: ^3.4.1
  # `flutter_cache_manager` is the disk-cache backend behind
  # `cached_network_image`. Pinned explicitly so `performLogout` can call
  # `DefaultCacheManager().emptyCache()` — the helper isn't re-exported by
  # `cached_network_image`, so relying on the transitive resolution would
  # break the import.
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.1.2
  image: ^4.3.0
  flutter_image_compress: ^2.3.0
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0

  # Typography — fonts are declared natively under `flutter.fonts` below.
  # The `google_fonts` package was previously used; it's no longer needed
  # because every TTF is bundled under `assets/google_fonts/` and looked up
  # by Flutter's built-in font loader via the family constants in
  # `lib/core/theme/app_fonts.dart`.

  # Icons
  iconsax_flutter: ^1.0.0

  # Masonry / staggered grid layout
  flutter_staggered_grid_view: ^0.7.0

  # Charts
  fl_chart: ^0.69.0

  # External actions (tel:, telegram links)
  url_launcher: ^6.3.1

  # Maps & location
  yandex_mapkit: ^4.2.1
  geolocator: ^13.0.2
  permission_handler: ^11.4.0
  mask_text_input_formatter: ^2.9.0

  # Logging
  talker_flutter: ^5.1.16

  # Crash reporting — Sentry. The DSN is injected via env (SENTRY_DSN); an
  # empty DSN leaves the SDK initialised-but-disabled. Talker errors are
  # forwarded to Sentry through SentryTalkerObserver (see lib/core/logging/).
  sentry_flutter: ^9.0.0

  # Connectivity — connectivity_plus detects link changes (wifi / cellular /
  # none), internet_connection_checker_plus verifies actual reachability so
  # the offline banner doesn't lie when the device is on a captive wifi that
  # has no internet.
  connectivity_plus: ^6.1.0
  internet_connection_checker_plus: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  # End-to-end happy-path test harness (ROADMAP B.5). Runs from
  # `integration_test/` via `flutter test integration_test` on a device.
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.1

# Generated iOS/Android launcher icons from a single 1024×1024 master.
# Run after changes:  dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  # Use the padded foreground (W in central 65%) for both iOS and the
  # legacy ic_launcher.png — same safe zone as Android adaptive, flattened
  # to cream for iOS.
  image_path: "assets/logo/woody_logo_foreground.png"
  min_sdk_android: 21
  # Apple App Store rejects icons with an alpha channel — flatten the iOS
  # variant against the cream brand background instead of leaving it
  # transparent.
  remove_alpha_ios: true
  background_color_ios: "#FBF1E8"
  # Adaptive icon (Android 8+): cream background + W foreground with the
  # 17.5% safe-zone padding pre-baked into woody_logo_foreground.png.
  adaptive_icon_background: "#FBF1E8"
  adaptive_icon_foreground: "assets/logo/woody_logo_foreground.png"
  # Themed icons (Android 13+): the system tints this silhouette to match
  # the user's wallpaper, so colour is dropped here on purpose.
  adaptive_icon_monochrome: "assets/logo/woody_logo_monochrome.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/google_fonts/

  # Native Flutter font registration — replaces the `google_fonts` package.
  # Every family/weight referenced via `AppFonts.*` in the code points back
  # to one of these TTFs. To add a new weight, drop the file into
  # `assets/google_fonts/` and append it here under the matching family.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/google_fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/google_fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/Inter-ExtraBold.ttf
          weight: 800
    - family: Manrope
      fonts:
        - asset: assets/google_fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/google_fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/Manrope-ExtraBold.ttf
          weight: 800
    - family: PlayfairDisplay
      fonts:
        - asset: assets/google_fonts/PlayfairDisplay-Regular.ttf
          weight: 400
        - asset: assets/google_fonts/PlayfairDisplay-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/PlayfairDisplay-ExtraBold.ttf
          weight: 800
    - family: PlusJakartaSans
      fonts:
        - asset: assets/google_fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/google_fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/google_fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
